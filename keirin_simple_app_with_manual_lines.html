<title>競輪予想シンプル版アプリ</title>
<style>
  :root{
    --bg:#0f172a;
    --card:#111827;
    --card2:#1f2937;
    --line:#334155;
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#22c55e;
    --accent2:#38bdf8;
    --warn:#f59e0b;
    --danger:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:linear-gradient(180deg,#020617,#0f172a 30%,#111827 100%);
    color:var(--text);
  }
  .wrap{max-width:860px;margin:0 auto;padding:16px 14px 48px}
  .hero{padding:8px 2px 14px}
  h1{font-size:24px;margin:0 0 6px}
  .sub{color:var(--muted);font-size:14px;line-height:1.6}
  .card{
    background:rgba(17,24,39,.95);
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px;
    margin:12px 0;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
  }
  h2{font-size:18px;margin:0 0 10px}
  h3{font-size:15px;margin:0 0 8px;color:#dbeafe}
  textarea,input,button,select{
    font:inherit;
  }
  textarea,input{
    width:100%;
    border-radius:14px;
    border:1px solid #475569;
    background:#0b1220;
    color:var(--text);
    padding:12px;
  }
  textarea{min-height:220px;resize:vertical;line-height:1.5}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  @media (max-width:720px){
    .row,.row3{grid-template-columns:1fr}
  }
  button{
    border:none;
    border-radius:14px;
    padding:13px 14px;
    font-weight:700;
    color:#04111d;
    background:linear-gradient(135deg,var(--accent),#86efac);
  }
  button.secondary{
    color:var(--text);
    background:#1e293b;
    border:1px solid #475569;
  }
  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
  .pill{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    margin-right:6px;
    margin-bottom:6px;
  }
  .good{background:rgba(34,197,94,.18);color:#86efac;border:1px solid rgba(34,197,94,.35)}
  .info{background:rgba(56,189,248,.16);color:#7dd3fc;border:1px solid rgba(56,189,248,.32)}
  .warn{background:rgba(245,158,11,.16);color:#fdba74;border:1px solid rgba(245,158,11,.32)}
  .danger{background:rgba(239,68,68,.16);color:#fca5a5;border:1px solid rgba(239,68,68,.32)}
  .list{display:grid;gap:10px}
  .item{
    background:#0b1220;
    border:1px solid #334155;
    border-radius:14px;
    padding:12px;
  }
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .ticket{
    display:flex;justify-content:space-between;gap:12px;align-items:center;
    border:1px solid #3f4b61;border-radius:14px;padding:12px;background:#0b1220;
  }
  .ticket strong{font-size:22px;letter-spacing:1px}
  .table{display:grid;gap:8px}
  .rider{
    display:grid;grid-template-columns:46px 1.4fr repeat(5, .8fr) 1fr;
    gap:8px;align-items:center;font-size:13px;
    background:#0b1220;border:1px solid #334155;border-radius:12px;padding:10px;
  }
  .rider.head{font-weight:700;background:#132035}
  @media (max-width:820px){
    .rider{grid-template-columns:38px 1.2fr repeat(3, .8fr) 1fr;}
    .hide-sm{display:none}
  }
  .footer{color:var(--muted);font-size:12px;line-height:1.7}
  code.inline{background:#0b1220;border:1px solid #334155;border-radius:8px;padding:2px 6px}
</style>
</head>

document.getElementById('sampleBtn').addEventListener('click',()=>{
  document.getElementById('rawInput').value = sample;
});

document.getElementById('clearBtn').addEventListener('click',()=>{
  document.getElementById('rawInput').value = '';
  document.getElementById('manualLineInput').value = '';
  document.getElementById('resultArea').innerHTML = '';
});

document.getElementById('analyzeBtn').addEventListener('click',()=>{
  const raw = document.getElementById('rawInput').value.trim();
  const manualLine = document.getElementById('manualLineInput').value.trim();
  const area = document.getElementById('resultArea');
  if(!raw){
    area.innerHTML = `<div class="card"><span class="pill danger">入力なし</span><div class="sub">出走表を貼ってから押してください。</div></div>`;
    return;
  }
  const riders = parseRiders(raw);
  if(riders.length === 0){
    area.innerHTML = `<div class="card"><span class="pill danger">解析失敗</span><div class="sub">貼り付け形式を読み取れませんでした。できればコメント欄まで含めて貼ってください。</div></div>`;
    return;
  }
  const enriched = enrich(riders);
  const lines = manualLine ? buildLinesFromManual(enriched, manualLine) : buildLines(enriched);
  const analysis = analyzeRace(enriched, lines);
  area.innerHTML = render(enriched, lines, analysis);
});

function normalizeText(t){
  return t.replace(/\r/g,'').replace(/　/g,' ').trim();
}

function cleanName(name){
  return name.replace(/\s+/g,'').trim();
}

function parseRiders(raw){
  raw = normalizeText(raw);
  const lines = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  const riders = [];
  for(let i=0;i<lines.length;i++){
    if(/^[1-7]$/.test(lines[i]) && i+1 < lines.length && cleanName(lines[i+1]).length>=2){
      const car = Number(lines[i]);
      let idx = i+1;
      const name = lines[idx++] || '';
      const profile = lines[idx++] || '';
      const score = parseFloat((lines[idx++]||'').replace(/[^\d.\-]/g,'')) || 0;
      const S = toNum(lines[idx++]);
      const B = toNum(lines[idx++]);
      const style = (lines[idx++]||'').trim();
      const nige = toNum(lines[idx++]);
      const makuri = toNum(lines[idx++]);
      const sashi = toNum(lines[idx++]);
      const mark = toNum(lines[idx++]);
      const first = toNum(lines[idx++]);
      const second = toNum(lines[idx++]);
      const third = toNum(lines[idx++]);
      const out = toNum(lines[idx++]);
      const winRate = parseFloat((lines[idx++]||'0').replace(/[^\d.\-]/g,'')) || 0;
      const twoRate = parseFloat((lines[idx++]||'0').replace(/[^\d.\-]/g,'')) || 0;
      const threeRate = parseFloat((lines[idx++]||'0').replace(/[^\d.\-]/g,'')) || 0;
      const gear = lines[idx++] || '';
      let comment = lines[idx] || '';
      if(comment && /[。.]$/.test(comment)) i = idx;
      else { comment = ''; i = idx-1; }
      riders.push({car,name:cleanName(name),profile,score,S,B,style,nige,makuri,sashi,mark,first,second,third,out,winRate,twoRate,threeRate,gear,comment});
    }
  }
  return dedupeByCar(riders).sort((a,b)=>a.car-b.car);
}

function dedupeByCar(arr){
  const map = new Map();
  for(const r of arr){ if(!map.has(r.car)) map.set(r.car,r); }
  return [...map.values()];
}

function toNum(v){
  const n = parseFloat(String(v||'').replace(/[^\d.\-]/g,''));
  return Number.isFinite(n) ? n : 0;
}

function enrich(riders){
  return riders.map(r=>{
    const profileTxt = r.profile || '';
    const is127 = /127期/.test(profileTxt);
    const isSelf = /自力|自在/.test(r.comment || '') || /逃|両/.test(r.style);
    const frontScore = r.B*2.2 + r.S*0.8 + r.nige*0.8 + r.makuri*0.5 + (is127?4:0) + (/逃/.test(r.style)?2:0) + (/両/.test(r.style)?1:0);
    const totalScore = r.score*1.5 + r.twoRate*0.35 + r.winRate*0.25 + r.threeRate*0.18 + r.B*0.6 + r.S*0.25 + r.sashi*0.35 + r.mark*0.2 + (is127?3:0);
    const chaseScore = r.score*1.35 + r.sashi*0.65 + r.mark*0.5 + r.twoRate*0.28 + r.threeRate*0.16;
    return {...r,is127,isSelf,frontScore,totalScore,chaseScore};
  });
}

function buildLines(riders){
  const parent = new Map(riders.map(r=>[r.car,r.car]));
  const find = x => parent.get(x)===x ? x : (parent.set(x, find(parent.get(x))), parent.get(x));
  const union = (a,b)=>{ a=find(a); b=find(b); if(a!==b) parent.set(b,a); };

  for(const r of riders){
    const c = r.comment || '';
    for(const other of riders){
      const surname = other.name.slice(0,2);
      if(other.car !== r.car && (c.includes(other.name) || (surname && c.includes(surname+'君')))){
        union(r.car, other.car);
      }
    }
  }

  const groups = new Map();
  riders.forEach(r=>{
    const root = find(r.car);
    if(!groups.has(root)) groups.set(root, []);
    groups.get(root).push(r);
  });

  let lines = [...groups.values()].map(group => orderGroup(group));
  lines = lines.filter(g=>g.length>0).sort((a,b)=>b.length-a.length || (b[0]?.frontScore||0)-(a[0]?.frontScore||0));
  return lines;
}

function buildLinesFromManual(riders, manual){
  const byCar = new Map(riders.map(r=>[String(r.car), r]));
  const used = new Set();
  const groups = manual.split('/').map(s=>s.trim()).filter(Boolean);
  const lines = [];

  for(const group of groups){
    const cars = group.split('-').map(s=>s.trim()).filter(Boolean);
    const line = [];
    for(const car of cars){
      const rider = byCar.get(car);
      if(rider && !used.has(rider.car)){
        line.push(rider);
        used.add(rider.car);
      }
    }
    if(line.length) lines.push(line);
  }

  for(const r of riders){
    if(!used.has(r.car)) lines.push([r]);
  }

  return lines;
}

function orderGroup(group){
  if(group.length===1) return group;
  const frontCandidates = [...group].sort((a,b)=>b.frontScore-a.frontScore || b.totalScore-a.totalScore);
  const front = frontCandidates[0];
  const ordered = [front];
  const used = new Set([front.car]);
  while(ordered.length < group.length){
    let best = null;
    let bestScore = -Infinity;
    for(const r of group){
      if(used.has(r.car)) continue;
      let score = r.chaseScore;
      const c = r.comment || '';
      const last = ordered[ordered.length-1];
      if(c.includes(last.name) || c.includes(last.name.slice(0,2)+'君')) score += 30;
      if(/中部勢|北勢|関東勢|中近で|九州勢|福島勢/.test(c)) score += 3;
      if(score > bestScore){ bestScore = score; best = r; }
    }
    used.add(best.car);
    ordered.push(best);
  }
  return ordered;
}

function analyzeRace(riders, lines){
  const sortedTotal = [...riders].sort((a,b)=>b.totalScore-a.totalScore);
  const sortedFront = [...riders].sort((a,b)=>b.frontScore-a.frontScore);
  const strongest = sortedTotal[0];
  const secondStrong = sortedTotal[1];
  const thirdStrong = sortedTotal[2];
  const mainLeader = sortedFront[0];
  const secondLeader = sortedFront[1];
  const leaderLine = lines.find(line=>line.some(r=>r.car===mainLeader.car)) || [mainLeader];
  const leaderPos2 = leaderLine[1] || null;
  const leaderPos3 = leaderLine[2] || null;

  let raceType = '混戦';
  if(strongest.totalScore - (secondStrong?.totalScore || 0) >= 12) raceType = '1強';
  else if(strongest.totalScore - (secondStrong?.totalScore || 0) <= 6) raceType = '2強';

  const resistance = secondLeader && secondLeader.frontScore >= mainLeader.frontScore*0.78;
  const leaderWeak = mainLeader.winRate < 15 && mainLeader.twoRate < 25;
  const lineLong = leaderLine.length >= 3;
  const banteStrong = leaderPos2 ? leaderPos2.chaseScore >= strongest.chaseScore*0.86 : false;

  let headCandidates = [];
  if(raceType === '1強'){
    headCandidates = [strongest];
  } else if(leaderPos2 && banteStrong && !resistance){
    headCandidates = [leaderPos2, mainLeader];
  } else {
    headCandidates = [leaderPos2 || mainLeader, mainLeader, strongest, secondStrong].filter((v,i,a)=>v && a.findIndex(x=>x.car===v.car)===i).slice(0,2);
  }

  let buyLevel = '普通';
  if(raceType==='1強' && !resistance) buyLevel = '固い';
  if(raceType==='混戦' || (leaderWeak && resistance)) buyLevel = '荒れ';

  const rivals = [secondStrong, thirdStrong, secondLeader].filter((v,i,a)=>v && a.findIndex(x=>x.car===v.car)===i && !leaderLine.some(x=>x.car===v.car));
  const freeThird = riders.filter(r=>!leaderLine.some(x=>x.car===r.car)).sort((a,b)=>b.totalScore-a.totalScore);

  const tickets = [];
  function addTicket(a,b,c,label){
    if(!a||!b||!c) return;
    if(new Set([a.car,b.car,c.car]).size<3) return;
    const code = `${a.car}-${b.car}-${c.car}`;
    if(!tickets.some(t=>t.code===code)) tickets.push({code,label});
  }

  if(buyLevel==='固い'){
    const head = headCandidates[0];
    addTicket(head, leaderPos2 || mainLeader, (rivals[0] || leaderPos3 || freeThird[0] || secondStrong), '本線');
    addTicket(head, (rivals[0] || leaderPos3 || freeThird[0]), leaderPos2 || leaderPos3 || secondStrong, '抑え');
  } else if(buyLevel==='普通'){
    const head = headCandidates[0];
    addTicket(head, leaderPos2 || mainLeader, (rivals[0] || leaderPos3 || freeThird[0] || secondStrong), '本線');
    addTicket(head, (rivals[0] || leaderPos3 || freeThird[0]), leaderPos2 || secondStrong || leaderPos3, '本線');
    addTicket((headCandidates[1] || mainLeader), head, (rivals[0] || leaderPos3 || freeThird[0]), '抑え');
  } else {
    addTicket(headCandidates[0], headCandidates[1] || mainLeader, rivals[0] || freeThird[0] || leaderPos3, '本線');
    addTicket(mainLeader, leaderPos2 || secondStrong, rivals[0] || freeThird[0], '抑え');
    addTicket(secondStrong, strongest, rivals[0] || leaderPos2 || freeThird[0], '抑え');
    addTicket(mainLeader, rivals[0] || secondStrong, leaderPos2 || freeThird[0], '穴');
  }

  const reasoning = [];
  reasoning.push(`レース判定は「${raceType}」`);
  reasoning.push(`主導権候補は ${mainLeader.car}番 ${mainLeader.name}` + (secondLeader ? `、対抗主導権は ${secondLeader.car}番 ${secondLeader.name}` : ''));
  if(leaderPos2) reasoning.push(`軸候補は ${leaderPos2.car}番 ${leaderPos2.name} と ${mainLeader.car}番 ${mainLeader.name}`);
  if(raceType==='1強') reasoning.push(`1強なので頭は ${strongest.car}番 固定寄り`);
  if(lineLong) reasoning.push('ラインが長いので後ろ残りも少し警戒');
  if(leaderWeak) reasoning.push('主導権候補はいるが先行の質は高すぎない');
  if(resistance) reasoning.push('対抗ラインも前に行けるので叩き合い注意');

  const hasLeader = !!mainLeader;
  let linePower = '弱';
  if(leaderLine.length >= 3) linePower = '強';
  else if(leaderLine.length === 2) linePower = '中';
  const conf = getConfidence(raceType, hasLeader, linePower);

  return {raceType,buyLevel,strongest,secondStrong,mainLeader,secondLeader,leaderLine,headCandidates,tickets:tickets.slice(0,4),reasoning,conf};
}

function getConfidence(raceType, hasClearLeader, lineStrength) {
  if (raceType === "1強" && hasClearLeader && lineStrength === "強") {
    return { level: "★★★", text: "高" };
  }
  if (raceType === "2強") {
    return { level: "★★☆", text: "中" };
  }
  return { level: "★☆☆", text: "低" };
}

function render(riders, lines, a){
  const racePillClass = a.buyLevel==='固い' ? 'good' : a.buyLevel==='普通' ? 'info' : 'warn';
  return `
    <div class="card">
      <h2>3. 予想結果</h2>
      <span class="pill ${racePillClass}">${a.buyLevel}</span>
      <span class="pill info">${a.raceType}</span>
      <span class="pill good">主導権 ${a.mainLeader.car}</span>
      ${a.secondLeader ? `<span class="pill warn">対抗主導権 ${a.secondLeader.car}</span>` : ''}
      <div class="list" style="margin-top:10px">
        ${a.reasoning.map(t=>`<div class="item">${t}</div>`).join('')}
      </div>
      <div class="sub" style="margin-top:10px">自信度：${a.conf.level}（${a.conf.text}）</div>
    </div>

    <div class="card">
      <h2>4. 実際に買う形</h2>
      <div class="list">
        ${a.tickets.map(t=>`<div class="ticket"><div><div class="small muted">${t.label}</div><strong>${t.code}</strong></div><div class="muted">${ticketHint(t.label)}</div></div>`).join('')}
      </div>
      <div class="sub" style="margin-top:10px">固いレースは2点、普通は3点、荒れなら見送りか4点までを想定しています。</div>
    </div>

    <div class="card">
      <h2>5. 並び推定</h2>
      <div class="list">
        ${lines.map((line,idx)=>`<div class="item"><b>ライン${idx+1}</b>： ${line.map(r=>`${r.car}-${r.name}`).join(' - ')}</div>`).join('')}
      </div>
    </div>

    <div class="card">
      <h2>6. 読み取った選手データ</h2>
      <div class="table">
        <div class="rider head"><div>車</div><div>選手</div><div>得点</div><div>S</div><div>B</div><div>脚</div><div class="hide-sm">前値</div><div>総合</div></div>
        ${[...riders].sort((x,y)=>y.totalScore-x.totalScore).map(r=>`
          <div class="rider">
            <div>${r.car}</div>
            <div>${r.name}</div>
            <div>${r.score.toFixed(2)}</div>
            <div>${r.S}</div>
            <div>${r.B}</div>
            <div>${r.style}</div>
            <div class="hide-sm">${r.frontScore.toFixed(1)}</div>
            <div>${r.totalScore.toFixed(1)}</div>
          </div>`).join('')}
      </div>
    </div>
  `;
}

function ticketHint(label){
  if(label==='本線') return '厚め';
  if(label==='抑え') return '薄め';
  return '遊び';
}
</script>
</body>
</html>
