
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE 1マーク展開AI AUTO NEXT FIXED</title>
<style>
:root{
  --bg:#0b1220;
  --card:#121c33;
  --line:#22304d;
  --text:#ffffff;
  --muted:#9fb0d1;
  --blue:#2563eb;
  --cyan:#06b6d4;
  --green:#16a34a;
  --red:#dc2626;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#08111f,#0d1730);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{max-width:430px;margin:auto;padding:12px}
.card{
  background:var(--card);
  padding:14px;
  margin:10px 0;
  border-radius:16px;
  border:1px solid var(--line);
}
h3{margin:0}
.sub{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6}
button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#fff;
  font-size:16px;
  font-weight:800;
}
.top-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.small-btn{
  height:44px;
  font-size:14px;
  font-weight:800;
}
.clear-btn{background:#374151}
.result{line-height:1.8}
.badge{
  display:inline-block;
  padding:7px 12px;
  border-radius:999px;
  margin:4px 4px 0 0;
  font-weight:800;
  font-size:13px;
}
.good{background:var(--green)}
.warn{background:var(--red)}
.tip{background:var(--blue)}
.head-grid,.row-grid{
  display:grid;
  grid-template-columns:42px repeat(4,1fr);
  gap:8px;
  align-items:center;
  margin-top:8px;
}
.head-cell{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}
.cap{
  display:flex;
  justify-content:center;
  align-items:center;
  height:48px;
  border-radius:10px;
  font-weight:900;
  font-size:18px;
}
.c1{background:#fff;color:#000}
.c2{background:#000;color:#fff}
.c3{background:#ef4444;color:#fff}
.c4{background:#2563eb;color:#fff}
.c5{background:#f59e0b;color:#000}
.c6{background:#16a34a;color:#fff}
.num-wrap{display:flex;flex-direction:column;gap:4px}
.num-input{
  width:100%;
  height:48px;
  border:none;
  border-radius:10px;
  background:#08101d;
  color:#fff;
  text-align:center;
  font-size:18px;
  font-weight:800;
  outline:none;
  border:1px solid #243352;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:textfield;
}
.num-input.active{
  border:2px solid #06b6d4;
  box-shadow:0 0 0 2px rgba(6,182,212,.15);
}
.num-input::-webkit-outer-spin-button,
.num-input::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}
.num-label{
  text-align:center;
  font-size:11px;
  color:var(--muted);
}
.comment{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#0d1628;
  border:1px solid #22304d;
}
.help{
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}
</style>
</head>
<body>
<div class="app">

  <div class="card">
    <h3>1マーク展開AI</h3>
    <div class="sub">
      初期表示で完全クリア修正版です。<br>
      ページ表示時・戻る操作後も入力値を強制クリアします。
    </div>
  </div>

  <div class="card">
    <form id="aiForm" autocomplete="off">
      <div class="head-grid">
        <div class="head-cell">艇</div>
        <div class="head-cell">ST</div>
        <div class="head-cell">展示</div>
        <div class="head-cell">M2</div>
        <div class="head-cell">勝率</div>
      </div>
      <div id="inputs"></div>
    </form>
    <div class="help">ST・展示・勝率は 0.13 / 6.75 形式。Enterでも次へ移動します。</div>
  </div>

  <div class="card">
    <div class="top-actions">
      <button type="button" class="small-btn clear-btn" onclick="clearInputs()">🗑 全クリア</button>
      <button type="button" class="small-btn" onclick="runAI()">🚤 展開予測</button>
    </div>
  </div>

  <div class="card result" id="result">結果待ち</div>

</div>

<script>
const inputOrder = [];

function makeInputs(){
  let html = "";
  for(let i=1;i<=6;i++){
    const ids = ["st"+i, "tenji"+i, "m2"+i, "rate"+i];
    inputOrder.push(...ids);

    html += `
      <div class="row-grid">
        <div class="cap c${i}">${i}</div>

        <div class="num-wrap">
          <input id="st${i}" name="st${i}" class="num-input" value="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="0.13">
          <div class="num-label">ST</div>
        </div>

        <div class="num-wrap">
          <input id="tenji${i}" name="tenji${i}" class="num-input" value="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="6.75">
          <div class="num-label">展示</div>
        </div>

        <div class="num-wrap">
          <input id="m2${i}" name="m2${i}" class="num-input" value="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="35.2">
          <div class="num-label">M2</div>
        </div>

        <div class="num-wrap">
          <input id="rate${i}" name="rate${i}" class="num-input" value="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="6.45">
          <div class="num-label">勝率</div>
        </div>
      </div>
    `;
  }
  document.getElementById("inputs").innerHTML = html;
  bindAutoNext();
}

function bindAutoNext(){
  inputOrder.forEach(id => {
    const el = document.getElementById(id);

    el.addEventListener("focus", () => {
      document.querySelectorAll(".num-input").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
    });

    el.addEventListener("blur", () => {
      el.classList.remove("active");
    });

    el.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        moveNext(id);
      }
    });

    el.addEventListener("input", () => {
      autoMoveIfComplete(id, el.value.trim());
    });
  });
}

function moveNext(currentId){
  const idx = inputOrder.indexOf(currentId);
  if(idx >= 0 && idx < inputOrder.length - 1){
    const next = document.getElementById(inputOrder[idx + 1]);
    if(next) next.focus();
  }
}

function autoMoveIfComplete(id, value){
  if(!value) return;

  let done = false;

  if(id.startsWith("st")){
    done = /^0?\.\d{2}$/.test(value) || /^\d\.\d{2}$/.test(value);
  } else if(id.startsWith("tenji")){
    done = /^\d\.\d{2}$/.test(value);
  } else if(id.startsWith("rate")){
    done = /^\d\.\d{2}$/.test(value);
  } else if(id.startsWith("m2")){
    done = /^\d{1,2}(\.\d)?$/.test(value);
  }

  if(done){
    moveNext(id);
  }
}

function num(id){
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) ? 0 : v;
}

function stPower(st){
  return st > 0 ? (0.20 - st) * 120 : 0;
}

function tenjiPower(t){
  return t > 0 ? (7 - t) * 18 : 0;
}

function clearInputs(){
  for(let i=1;i<=6;i++){
    document.getElementById("st"+i).value = "";
    document.getElementById("tenji"+i).value = "";
    document.getElementById("m2"+i).value = "";
    document.getElementById("rate"+i).value = "";
  }
  document.querySelectorAll(".num-input").forEach(x => x.classList.remove("active"));
  document.getElementById("result").innerHTML = "結果待ち";
  const first = document.getElementById("st1");
  if(first) first.focus();
}

function forceInitialClear(){
  const form = document.getElementById("aiForm");
  if(form) form.reset();
  clearInputs();
  setTimeout(() => {
    if(form) form.reset();
    clearInputs();
  }, 0);
  setTimeout(() => {
    if(form) form.reset();
    clearInputs();
  }, 150);
}

function runAI(){
  const boats = [];

  for(let i=1;i<=6;i++){
    boats.push({
      boat:i,
      st:num("st"+i),
      tenji:num("tenji"+i),
      m2:num("m2"+i),
      rate:num("rate"+i)
    });
  }

  const one   = boats[0];
  const two   = boats[1];
  const three = boats[2];
  const four  = boats[3];

  const inEscape =
    one.rate * 8 +
    one.m2 * 0.5 +
    stPower(one.st) +
    tenjiPower(one.tenji);

  const sashi =
    two.rate * 6 +
    two.m2 * 0.4 +
    stPower(two.st) +
    tenjiPower(two.tenji);

  const makuri3 =
    three.rate * 5 +
    three.m2 * 0.4 +
    stPower(three.st) +
    tenjiPower(three.tenji);

  const makuri4 =
    four.rate * 6 +
    four.m2 * 0.5 +
    stPower(four.st) +
    tenjiPower(four.tenji);

  const makuri = Math.max(makuri3, makuri4);

  let scenario = "イン逃げ";
  let attacker = 1;

  if(inEscape < sashi && sashi > makuri){
    scenario = "差し";
    attacker = 2;
  } else if(makuri > inEscape){
    scenario = "まくり/まくり差し";
    attacker = (makuri4 > makuri3) ? 4 : 3;
  }

  const risk = Math.max(0, sashi + makuri - inEscape);

  let riskText = "低";
  let riskClass = "good";
  if(risk > 50){
    riskText = "高";
    riskClass = "warn";
  } else if(risk > 25){
    riskText = "中";
    riskClass = "tip";
  }

  let order = "1-2-3";
  if(scenario === "差し") order = "2-1-3";
  if(scenario.indexOf("まくり") >= 0) order = attacker + "-1-2";

  let comment = "";
  if(scenario === "イン逃げ"){
    comment = "①が先マイして押し切る展開。";
  } else if(scenario === "差し"){
    comment = "②が差して①を捕らえる展開。";
  } else {
    comment = attacker + "が外から攻めて1マークの形を崩す展開。";
  }

  document.getElementById("result").innerHTML = `
    <div class="badge tip">展開タイプ：${scenario}</div>
    <div class="badge good">攻め艇：${attacker}号艇</div>
    <div class="badge ${riskClass}">危険度：${riskText}</div>
    <div class="comment">
      <b>1マーク通過予想：</b> ${order}<br>
      <b>コメント：</b> ${comment}
    </div>
  `;
}

makeInputs();
forceInitialClear();

window.addEventListener("load", forceInitialClear);
window.addEventListener("pageshow", forceInitialClear);
document.addEventListener("DOMContentLoaded", forceInitialClear);
</script>
</body>
</html>
