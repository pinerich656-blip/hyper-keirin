
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOATERS専用整形ツール v3</title>
<style>
:root{--bg:#0b1220;--card:#121c33;--line:#22304d;--text:#fff;--muted:#9fb0d1;--blue:#2563eb;--cyan:#06b6d4}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#08111f,#0d1730);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.app{max-width:900px;margin:auto;padding:12px}
.card{background:var(--card);padding:14px;margin:10px 0;border-radius:16px;border:1px solid var(--line)}
h1{margin:0;font-size:22px}
.small{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.7}
textarea{width:100%;min-height:260px;border:none;border-radius:12px;padding:12px;background:#08101d;color:#fff;border:1px solid #243352;resize:vertical;font-size:14px;line-height:1.55}
button{width:100%;padding:14px;margin-top:6px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:16px;font-weight:800}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.secondary{background:#374151}
pre{margin:0;white-space:pre-wrap;word-break:break-word;background:#08101d;border:1px solid #243352;border-radius:12px;padding:12px;font-size:14px;line-height:1.6}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px 4px 0 0;font-weight:800;font-size:12px}
.tip{background:#2563eb}.good{background:#16a34a}.warn{background:#dc2626}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>BOATERS専用整形ツール v3</h1>
    <div class="small">
      boaters の生データをそのまま貼って整形します。<br>
      列の区切りがズレても、見出しごとに必要数だけ拾う方式に変更した改良版です。
    </div>
  </div>

  <div class="card">
    <div class="badge tip">入力</div>
    <textarea id="raw" placeholder="boaters の生データをそのまま貼り付け"></textarea>
    <div class="actions">
      <button onclick="convertData()">整形する</button>
      <button class="secondary" onclick="clearAll()">全クリア</button>
    </div>
  </div>

  <div class="card">
    <div class="badge good">整形結果</div>
    <pre id="out">ここに結果が出ます</pre>
  </div>
</div>

<script>
function clearAll(){
  document.getElementById("raw").value = "";
  document.getElementById("out").textContent = "ここに結果が出ます";
}

function splitLines(text){
  return text.split(/\r?\n/).map(s => s.replace(/\u00A0/g," ").trim()).filter(Boolean);
}
function isNum(s){ return /^-?\d+(\.\d+)?$/.test(s); }
function findLine(lines, keyword){ return lines.findIndex(x => x.includes(keyword)); }
function rev(arr){ return arr.slice().reverse(); }

function takeNumbersBetween(lines, startIdx, endKeywords, limit){
  const out = [];
  for(let i=startIdx+1; i<lines.length; i++){
    const s = lines[i];
    if(endKeywords.some(k => s.includes(k))) break;
    if(isNum(s)) out.push(parseFloat(s));
    if(limit && out.length >= limit) break;
  }
  return out;
}
function takeKimariteBetween(lines, startIdx, endKeywords, limit){
  const out = [];
  for(let i=startIdx+1; i<lines.length; i++){
    const s = lines[i];
    if(endKeywords.some(k => s.includes(k))) break;
    if(/^\d+\/\d+\/\d+$/.test(s)) out.push(s);
    if(limit && out.length >= limit) break;
  }
  return out;
}
function pairsToField(nums, field){
  const out = [];
  for(let i=0;i+1<nums.length;i+=2){
    out.push(field===0 ? nums[i] : nums[i+1]);
  }
  return out;
}
function parseF(lines){
  const idx = findLine(lines, "Ｆ");
  if(idx < 0) return Array(6).fill("なし");
  const raw = [];
  for(let i=idx+1; i<lines.length; i++){
    const s = lines[i];
    if(s.includes("Ｌ")) break;
    if(s === "-" || /^\d+\s*\((未|済)\)$/.test(s)) raw.push(s);
    if(raw.length >= 6) break;
  }
  while(raw.length < 6) raw.push("-");
  return rev(raw).map(v => {
    if(v === "-") return "なし";
    const m = v.match(/^(\d+)\s*\((未|済)\)$/);
    return m ? "F" + m[1] : "なし";
  });
}

function convertData(){
  const lines = splitLines(document.getElementById("raw").value);
  const out = document.getElementById("out");
  if(lines.length < 40){
    out.textContent = "データ量が足りません。";
    return;
  }

  const idxNational = findLine(lines, "全国勝率");
  const idxMotor = lines.findIndex((x,i) => x.includes("モーター") && i+1 < lines.length && lines[i+1].includes("2連率"));
  const idxAvgST = findLine(lines, "平均ST");
  const idxSession = findLine(lines, "今節平均ST");
  const idxCourseData = findLine(lines, "コース別データ");
  const idxCourseWin = lines.findIndex((x,i) => x.includes("コース別") && i+1 < lines.length && lines[i+1].includes("勝率"));
  const idxKimari = findLine(lines, "決まり手");
  const idxCourse2 = lines.findIndex((x,i) => x.includes("コース別") && i+1 < lines.length && lines[i+1].includes("2着内率"));

  if([idxNational, idxMotor, idxAvgST, idxSession, idxCourseData, idxCourseWin, idxKimari, idxCourse2].some(x => x < 0)){
    out.textContent = "必要な見出しが見つかりません。コピー範囲を広げてください。";
    return;
  }

  try{
    const fVals = parseF(lines);

    const nationalNums = takeNumbersBetween(lines, idxNational, ["当地勝率"], 12);
    const wins = rev(pairsToField(nationalNums, 0));

    const motorNums = takeNumbersBetween(lines, idxMotor, ["モーター＆舟足評価"], 12);
    const motor2 = rev(pairsToField(motorNums, 1));

    const avgST = rev(takeNumbersBetween(lines, idxAvgST, ["今節平均ST"], 6));

    const sessionNums = takeNumbersBetween(lines, idxSession, ["コース別データ"], 12);
    const sessionST = rev(pairsToField(sessionNums, 0));
    const avgStartRank = rev(pairsToField(sessionNums, 1));

    const courseSTNums = takeNumbersBetween(lines, idxCourseData, ["コース別", "勝率"], 12);
    const courseST = rev(pairsToField(courseSTNums, 0));

    const courseWin = rev(takeNumbersBetween(lines, idxCourseWin, ["決まり手"], 6));

    const kimari = rev(takeKimariteBetween(lines, idxKimari, ["2着内率"], 6));

    const course2 = rev(takeNumbersBetween(lines, idxCourse2, ["3着内率", "当地"], 6));

    const cols = [fVals, wins, motor2, avgST, sessionST, avgStartRank, courseST, courseWin, kimari, course2];
    const mins = Math.min(...cols.map(c => c.length));
    if(mins < 6){
      out.textContent = "読み取り途中で不足しました。\n\n" +
        "F=" + fVals.length + " 勝率=" + wins.length + " M2=" + motor2.length + " 平均ST=" + avgST.length +
        " 今節ST=" + sessionST.length + " 平均ST順=" + avgStartRank.length + " コースST=" + courseST.length +
        " コース勝率=" + courseWin.length + " 決まり手=" + kimari.length + " コース2連=" + course2.length;
      return;
    }

    const rows = [];
    for(let i=0;i<6;i++){
      rows.push([
        i+1,
        fVals[i],
        Number(avgST[i]||0).toFixed(2),
        Number(wins[i]||0).toFixed(2),
        Number(motor2[i]||0).toFixed(2),
        Number(courseST[i]||0).toFixed(2),
        Number(course2[i]||0).toFixed(2),
        kimari[i] || "0/0/0",
        Number(courseWin[i]||0).toFixed(2),
        Number(sessionST[i]||0).toFixed(2),
        Number(avgStartRank[i]||0).toFixed(1)
      ].join(","));
    }

    out.textContent =
`艇,F,ST,勝率,モーター2連率,コース別平均ST,コース別2着内率,決まり手（差/捲/捲差）,コース別勝率,今節平均ST,平均スタート順

${rows.join("\n")}`;
  }catch(e){
    out.textContent = "整形中にエラーが出ました。";
  }
}
</script>
</body>
</html>
