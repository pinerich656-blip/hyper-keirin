<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格競輪予測 Pro - Line Edition</title>
    <style>
        :root {
            --color-1: #ffffff; --color-2: #333333; --color-3: #e74c3c;
            --color-4: #3498db; --color-5: #f1c40f; --color-6: #27ae60;
            --color-7: #e67e22; --color-8: #95a5a6; --color-9: #8e44ad;
        }
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a1a1a; font-size: 1.2rem; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        
        .section-title { font-size: 0.9rem; font-weight: bold; color: #27ae60; margin: 15px 0 5px 0; }
        .setup-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .line-input-area { background: #eef7f2; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .line-input-area input { border: 2px solid #27ae60; }

        .player-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
        .car-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ccc; font-size: 0.8rem; }
        
        .car-1 { background: var(--color-1); color: #000; }
        .car-2 { background: var(--color-2); color: #fff; }
        .car-3 { background: var(--color-3); color: #fff; }
        .car-4 { background: var(--color-4); color: #fff; }
        .car-5 { background: var(--color-5); color: #000; }
        .car-6 { background: var(--color-6); color: #fff; }
        .car-7 { background: var(--color-7); color: #fff; }
        .car-8 { background: var(--color-8); color: #fff; }
        .car-9 { background: var(--color-9); color: #fff; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-fetch { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-calc { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #result { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; background: #fffbe6; border: 2px solid #ffe58f; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .mark { color: #e67e22; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>本格競輪予測 Pro v2</h1>
    
    <div class="btn-group" style="margin-bottom: 15px;">
        <button class="btn-fetch" onclick="autoFetchData()">📡 データ自動取得</button>
        <div style="font-size: 0.7rem; color: #666; display: flex; align-items: center;">※最新データを外部JSONから読み込み</div>
    </div>

    <div class="section-title">ライン構成 (例: 127 34 56)</div>
    <div class="line-input-area">
        <input type="text" id="line-config" placeholder="ラインを半角スペース区切りで入力">
    </div>

    <div class="setup-section">
        <select id="stadium">
            <option value="1.0">基準 (400m)</option>
            <option value="1.1">直線長 (松山等)</option>
            <option value="0.9">短周 (小倉等)</option>
        </select>
        <input type="number" id="race-num" value="1" min="1">
    </div>

    <div id="players">
        </div>

    <button class="btn-calc" style="width:100%; margin-top:10px;" onclick="runCalculation()">予想実行</button>

    <div id="result">
        <h3 style="margin:0 0 10px 0; font-size: 1rem;">🎯 最終予測結果</h3>
        <div id="prediction-list"></div>
    </div>
</div>

<script>
    // 画面初期化（9車分の入力欄作成）
    const pArea = document.getElementById('players');
    for(let i=1; i<=9; i++) {
        pArea.innerHTML += `
            <div class="player-row">
                <div class="car-num car-${i}">${i}</div>
                <input type="number" id="score${i}" placeholder="得点" step="0.1">
                <input type="text" id="name${i}" placeholder="選手名" style="font-size:0.8rem;">
            </div>
        `;
    }

    // 1. データ自動取得（シミュレーション）
    async function autoFetchData() {
    try {
        // 同じ場所にある data.json を読みに行く
        const response = await fetch('data.json');
        const data = await response.json();
        
        data.forEach(d => {
            if(document.getElementById(`score${d.id}`)) {
                document.getElementById(`score${d.id}`).value = d.s;
                document.getElementById(`name${d.id}`).value = d.n;
            }
        });
        alert("GitHubから最新データを取得しました！");
    } catch (error) {
        console.error("エラー:", error);
        alert("データの読み込みに失敗しました。ファイルがあるか確認してね。");
    }
}


    // 2. 予測計算（ライン考慮版）
    function runCalculation() {
        const lineText = document.getElementById('line-config').value; // 例 "127 34 56"
        const lines = lineText.split(' ');
        const stadiumMod = parseFloat(document.getElementById('stadium').value);
        
        // 各ラインの先頭選手（自力選手）を抽出
        const leaders = lines.map(l => l[0]); 

        let results = [];
        for(let i=1; i<=9; i++) {
            let score = parseFloat(document.getElementById(`score${i}`).value) || 0;
            if(score === 0) continue;

            // 基本スコア計算
            let finalScore = score * stadiumMod;

            // ライン先頭ボーナス（自力評価）
            if(leaders.includes(i.toString())) {
                finalScore += 2.0; // 先行選手に一律加点
            }

            results.push({ car: i, name: document.getElementById(`name${i}`).value, score: finalScore });
        }

        results.sort((a, b) => b.score - a.score);

        const list = document.getElementById('prediction-list');
        list.innerHTML = '';
        const marks = ['◎', '○', '▲', '△', '×'];
        
        results.forEach((r, idx) => {
            const mark = marks[idx] || ' ';
            list.innerHTML += `
                <div class="rank-item">
                    <span><span class="mark">${mark}</span>${r.car}番車 (${r.name || '無名'})</span>
                    <span style="font-weight:bold;">${r.score.toFixed(2)}</span>
                </div>
            `;
        });
        document.getElementById('result').style.display = 'block';
    }
</script>
</body>
</html>
