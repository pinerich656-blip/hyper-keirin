<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keirin AI - Apex Mastery</title>
  <style>
    :root {
      --bg: #0b1220; --card: #121c33; --line: #243352; --text: #ffffff;
      --muted: #9fb0d1; --accent: #2563eb; --good-bg: rgba(22, 163, 74, 0.18);
      --warn-bg: rgba(245, 158, 11, 0.16); --danger-bg: rgba(239, 68, 68, 0.16);
      --shadow: rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 16px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 28px var(--shadow); }
    h1, h2, h3 { margin-top: 0; }
    textarea, input { width: 100%; background: #0d162b; border: 1px solid var(--line); color: #fff; padding: 12px; border-radius: 12px; margin-bottom: 12px; font-size: 14px; }
    .buttonRow { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    button { flex: 1; min-width: 120px; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    button.secondary { background: #233453; }
    .tableWrap { overflow-x: auto; border-radius: 12px; background: #0d162b; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 12px; border-bottom: 1px solid var(--line); text-align: center; font-size: 13px; }
    .score-high { background: rgba(22, 163, 74, 0.12); }
    .score-mid { background: rgba(37, 99, 235, 0.10); }
    .bet-main { background: var(--good-bg); border: 1px solid rgba(22, 163, 74, 0.45); border-radius: 10px; padding: 8px; margin: 5px 0; list-style: none; }
    .bet-sub { background: var(--warn-bg); border: 1px solid rgba(245, 158, 11, 0.45); border-radius: 10px; padding: 8px; margin: 5px 0; list-style: none; }
    .hit-main { background: var(--good-bg); border: 1px solid rgba(22, 163, 74, 0.45); padding: 15px; border-radius: 12px; font-weight: bold; color: #d8ffe4; }
    .hit-sub { background: var(--warn-bg); border: 1px solid rgba(245, 158, 11, 0.45); padding: 15px; border-radius: 12px; font-weight: bold; color: #ffe9b5; }
    .hit-miss { background: var(--danger-bg); border: 1px solid rgba(239, 68, 68, 0.45); padding: 15px; border-radius: 12px; font-weight: bold; color: #ffd5d5; }
    .hidden { display: none; }
    .grid { display: grid; gap: 15px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>Keirin-AI Apex Mastery</h1></header>

    <section class="card">
      <h2>① データ取得・変換</h2>
      <div class="buttonRow">
        <button id="loadGithubBtn" style="background: #059669;">GitHubから最新読込</button>
        <button id="clearBtn" class="secondary">全クリア</button>
      </div>
      <textarea id="rawInput" rows="4" placeholder="元データを貼り付け or GitHub読込"></textarea>
      <div class="buttonRow">
        <button id="convertBtn">変換実行</button>
      </div>
      <textarea id="csvInput" rows="4" placeholder="CSVデータがここに入ります"></textarea>
    </section>

    <section class="card">
      <h2>② AI判定・並び入力</h2>
      <input id="lineInput" type="text" placeholder="並び (例: 1-4-5/2-7/3-6)" />
      <button id="analyzeBtn" style="width: 100%;">AI判定・スコア計算</button>
      
      <div id="result" class="hidden" style="margin-top:20px;">
        <div class="grid">
          <div><h3>レース構造</h3><div id="structureText" style="padding:10px; background:#0d162b; border-radius:10px;"></div></div>
          <div><h3>結論</h3><div id="conclusionText" style="padding:10px; background:#0d162b; border-radius:10px;"></div></div>
        </div>
        <div class="grid" style="margin-top:15px;">
          <div><h3>本線</h3><ul id="mainLine" style="padding:0;"></ul></div>
          <div><h3>対抗・押さえ</h3><ul id="subLine" style="padding:0;"></ul></div>
        </div>
        <h3>選手別スコア詳細</h3>
        <div class="tableWrap">
          <table id="scoreTable">
            <thead>
              <tr><th>車番</th><th>前取</th><th>主導</th><th>番手</th><th>後出</th><th>格上</th><th>単騎</th><th>総合</th><th>メモ</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>③ 的中チェック</h2>
      <input id="actualResult" type="text" placeholder="実際の結果 (例: 1-4-5)" />
      <button id="checkHitBtn" class="secondary" style="width: 100%;">的中チェック実行</button>
      <div id="hitResult" style="margin-top:15px;"></div>
    </section>
  </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
      let latestResult = null;

      // --- ユタカ特製：スコアリングロジック ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function scoreRacer(r, pos, maxB, maxS) {
        const front = clamp(((r.S / Math.max(1, maxS)) * 2) + (pos?.pos === 0 ? 0.5 : 0), 0, 3);
        const initiative = clamp(((r.B / Math.max(1, maxB)) * 2) + (r.style === '逃' ? 0.8 : r.style === '両' ? 0.4 : 0), 0, 3);
        const anchor = clamp((pos?.pos === 1 ? 1.2 : pos?.pos === 2 ? 0.6 : 0) + (r.quinella / 50), 0, 3);
        const late = clamp((r.win / 40) + (r.style === '両' ? 0.8 : r.style === '追' ? 0.4 : 0), 0, 3);
        const elite = clamp((r.win / 35) + (r.quinella / 60) + (r.score / 110), 0, 3);
        const soloRisk = clamp((pos?.pos === 1 ? 1.0 : 0) + (r.B >= 8 ? 0.5 : 0), 0, 3);

        const total = (front * 0.15) + (initiative * 0.25) + (anchor * 0.20) + (late * 0.15) + (elite * 0.20) - (soloRisk * 0.10);
        return { front, initiative, anchor, late, elite, soloRisk, total: Number(total.toFixed(2)) };
      }

      // --- ユタカ特製：データ解析ロジック ---
      function convertRawToCsv(raw) {
        const cleanRaw = raw.replace(/\s+/g, '');
        const rows = [];
        const playerRegex = /([一-龠]{2,})([一-龠]{2,})(\d{2})(\d{4})(\d+)/g;
        let m, carCount = 1;
        while ((m = playerRegex.exec(cleanRaw)) !== null) {
          const scoreStr = m[4];
          const tailNums = m[5];
          const n = tailNums.match(/.{1,2}/g) || [];
          rows.push({
            car: carCount++,
            score: (parseFloat(scoreStr) / 100).toFixed(2),
            b: Number(n[4]) || 0, s: Number(n[3]) || 0, style: '自在',
            win: n[0] ? (parseFloat(n[0]) / 10).toFixed(1) : "0.0",
            ren2: Number(n[1]) || 0, ren3: Number(n[2]) || 0
          });
        }
        if (rows.length === 0) return null;
        return '車番,得点,B,S,脚質,勝率,2連対率,3連対率\n' + 
               rows.map(r => `${r.car},${r.score},${r.b},${r.s},${r.style},${r.win},${r.ren2},${r.ren3}`).join('\n');
      }

      function parseCSV(text) {
        const lines = text.trim().split('\n');
        if (lines.length < 2) return [];
        return lines.slice(1).map(l => {
          const c = l.split(',');
          return { num: Number(c[0]), score: Number(c[1]), B: Number(c[2]), S: Number(c[3]), style: c[4], win: Number(c[5]), quinella: Number(c[6]), trio: Number(c[7]) };
        });
      }

      // --- GitHub読込 ---
      document.getElementById('loadGithubBtn').addEventListener('click', async () => {
        const btn = document.getElementById('loadGithubBtn');
        const url = `https://raw.githubusercontent.com/pinerich656-blip/hyper-keirin/main/data.json?t=${new Date().getTime()}`;
        try {
          btn.textContent = '読込中...';
          const res = await fetch(url);
          const txt = await res.text();
          document.getElementById('rawInput').value = txt;
          const csv = convertRawToCsv(txt);
          if(csv) {
            document.getElementById('csvInput').value = csv;
            btn.textContent = '読込＆変換成功';
          }
        } catch (e) { alert('読込失敗'); }
        setTimeout(() => btn.textContent = 'GitHubから最新読込', 2000);
      });

      // --- AI判定ボタン ---
      document.getElementById('analyzeBtn').addEventListener('click', () => {
        const csvVal = document.getElementById('csvInput').value;
        const lineStr = document.getElementById('lineInput').value;
        if (!csvVal || !lineStr) return alert('入力が不足しています');

        const racers = parseCSV(csvVal);
        const lineup = lineStr.split('/').map(t => t.split('-').map(Number));
        const posMap = new Map();
        lineup.forEach((team, i) => team.forEach((num, j) => posMap.set(num, { team: i, pos: j })));

        const maxB = Math.max(...racers.map(r => r.B));
        const maxS = Math.max(...racers.map(r => r.S));

        const scored = racers.map(r => ({ ...r, pos: posMap.get(r.num), ai: scoreRacer(r, posMap.get(r.num), maxB, maxS) }));
        
        const leaders = scored.filter(r => r.ai.initiative >= 2);
        let structure = leaders.length >= 3 ? '踏み合い戦' : (leaders.length === 2 ? '崩壊戦' : '安定戦');

        const sorted = [...scored].sort((a,b) => b.ai.total - a.ai.total);
        renderResult(sorted, structure);
      });

      function renderResult(scored, structure) {
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('resultEmpty').classList.add('hidden');
        document.getElementById('structureText').textContent = `構造: ${structure}`;
        document.getElementById('conclusionText').textContent = `${scored[0].num}番を軸に評価。`;
        
        const tbody = document.querySelector('#scoreTable tbody');
        tbody.innerHTML = '';
        scored.forEach(r => {
          const tr = document.createElement('tr');
          if (r.ai.total >= 1.9) tr.className = 'score-high';
          else if (r.ai.total >= 1.5) tr.className = 'score-mid';
          tr.innerHTML = `<td>${r.num}</td><td>${r.ai.front.toFixed(1)}</td><td>${r.ai.initiative.toFixed(1)}</td><td>${r.ai.anchor.toFixed(1)}</td><td>${r.ai.late.toFixed(1)}</td><td>${r.ai.elite.toFixed(1)}</td><td>${r.ai.soloRisk.toFixed(1)}</td><td>${r.ai.total.toFixed(2)}</td><td>ライン${(r.pos?.team + 1) || '単'}</td>`;
          tbody.appendChild(tr);
        });
        
        const top = scored[0].num;
        const s2 = scored[1] ? scored[1].num : '';
        const s3 = scored[2] ? scored[2].num : '';
        const s4 = scored[3] ? scored[3].num : '';

        const mainBets = [];
        if (top && s2 && s3) mainBets.push(`${top}-${s2}-${s3}`);
        if (top && s2 && s4) mainBets.push(`${top}-${s2}-${s4}`);

        const subBets = [];
        if (top && s3 && s2) subBets.push(`${top}-${s3}-${s2}`);
        if (top && s3 && s4) subBets.push(`${top}-${s3}-${s4}`);
        if (s2 && top && s3) subBets.push(`${s2}-${top}-${s3}`);

        document.getElementById('mainLine').innerHTML = mainBets.map(v => `<li class="bet-main">${v}</li>`).join('');
        document.getElementById('subLine').innerHTML = subBets.map(v => `<li class="bet-sub">${v}</li>`).join('');

        latestResult = { main: mainBets, sub: subBets };
      }

      // --- 的中チェック（IDを修正） ---
      document.getElementById('checkHitBtn').addEventListener('click', () => {
        const actual = (document.getElementById('actualResult').value || '').trim();
        const hitResult = document.getElementById('hitResult');
        if (!actual) { hitResult.textContent = '結果を入力してください。'; return; }
        if (!latestResult) { hitResult.textContent = '先にAI判定をしてください。'; return; }

        if (latestResult.main.includes(actual)) {
          hitResult.className = 'hit-main'; hitResult.textContent = `◎ 本線的中: ${actual}`;
        } else if (latestResult.sub.includes(actual)) {
          hitResult.className = 'hit-sub'; hitResult.textContent = `○ 対抗・押さえ的中: ${actual}`;
        } else {
          hitResult.className = 'hit-miss'; hitResult.textContent = `× 不的中: ${actual}`;
        }
      });

      // --- クリアボタン ---
      document.getElementById('clearBtn').addEventListener('click', () => {
        document.getElementById('rawInput').value = '';
        document.getElementById('csvInput').value = '';
        document.getElementById('lineInput').value = '';
        document.getElementById('actualResult').value = '';
        document.getElementById('result').classList.add('hidden');
        document.getElementById('resultEmpty').classList.remove('hidden');
        document.getElementById('hitResult').innerHTML = '';
        document.getElementById('hitResult').className = 'muted';
        document.getElementById('hitResult').textContent = '結果を入れて「的中チェック」を押してください。';
        document.querySelector('#scoreTable tbody').innerHTML = '';
        latestResult = null;
      });

    });
  </script>

</body>
</html>
