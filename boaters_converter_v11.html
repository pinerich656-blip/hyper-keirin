
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BOATERS整形ツール v11（F完全修正版）</title>
<style>
body{font-family:sans-serif;background:#0d1730;color:#fff;padding:20px}
textarea{width:100%;height:250px;margin-bottom:10px}
button{padding:10px 20px;font-size:16px}
pre{background:#08101d;padding:10px}
</style>
</head>
<body>

<h2>BOATERS整形ツール v11</h2>
<p>Fの並びを完全修正（6→1 → 1→6変換）</p>

<textarea id="raw"></textarea>
<button onclick="run()">整形</button>

<pre id="out"></pre>

<script>
function splitLines(t){
  return t.split(/\n/).map(s=>s.trim()).filter(Boolean);
}
function isNum(s){return /^-?\d+(\.\d+)?$/.test(s);}

function parseF(lines){
  const idx = lines.findIndex(l=>l.includes("Ｆ"));
  if(idx<0) return Array(6).fill("なし");

  // Ｆの直前6行（6→1）
  const raw = lines.slice(idx-6, idx);

  // 逆にして1→6へ
  const ordered = raw.reverse();

  return ordered.map(v=>{
    if(v==="-"||v==="") return "なし";
    const m=v.match(/(\d+)/);
    return m ? "F"+m[1] : "なし";
  });
}

function run(){
  const lines=splitLines(document.getElementById("raw").value);
  const f=parseF(lines);
  document.getElementById("out").textContent = JSON.stringify(f,null,2);
}
</script>

</body>
</html>
